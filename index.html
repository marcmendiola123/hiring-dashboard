<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hiring Pipeline</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F8F7F4; --surface: #FFFFFF; --border: #E5E3DC; --border-strong: #C8C5BC;
  --text: #1C1B18; --text-muted: #6B6860; --text-hint: #A8A59E;
  --header-bg: #1C1B18; --active-row: #F2FAF3;
  --sf: #1B4FA8; --sfb: #E8EFFC;
  --si: #6B3FA0; --sib: #F0EAFA;
  --sp: #8B5E00; --spb: #FEF3DA;
  --sv: #0F6E56; --svb: #E1F5EE;
  --so: #C05C00; --sob: #FEF0E6;
  --sa: #2D6A4F; --sab: #EAF5EF;
  --sd: #A32D2D; --sdb: #FCEBEB;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* TOP BAR */
.top-bar { background: var(--header-bg); color: #fff; padding: 14px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 200; }
.top-bar-left { display: flex; align-items: center; gap: 12px; }
.logo { width: 28px; height: 28px; background: rgba(255,255,255,0.15); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.top-bar h1 { font-size: 14px; font-weight: 600; }
.top-bar-right { display: flex; align-items: center; gap: 12px; }
.last-updated { font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'JetBrains Mono', monospace; }
.refresh-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; color: rgba(255,255,255,0.8); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; }
.refresh-btn:hover { background: rgba(255,255,255,0.18); }

/* VIEW TABS */
.view-tabs { display: flex; gap: 0; background: var(--header-bg); padding: 0 28px; border-bottom: 1px solid rgba(255,255,255,0.1); }
.view-tab { padding: 10px 18px; font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.45); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s; user-select: none; }
.view-tab:hover { color: rgba(255,255,255,0.75); }
.view-tab.active { color: #fff; border-bottom-color: #fff; }

/* BUBBLE ROWS */
.bubble-section { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 28px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.bubble-section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-hint); margin-right: 4px; white-space: nowrap; }
.bubble { display: inline-flex; align-items: center; gap: 7px; padding: 6px 12px; border-radius: 20px; font-size: 11.5px; font-weight: 600; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; user-select: none; }
.bubble .bcount { font-size: 14px; font-weight: 700; line-height: 1; }
.bubble .blabel { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; opacity: 0.85; }
.bubble.on { border-color: currentColor; }

/* STATUS BUBBLES */
.b-all     { background: #F1EFE8; color: #2C2C2A; }
.b-finding { background: var(--sfb); color: var(--sf); }
.b-intro   { background: var(--sib); color: var(--si); }
.b-pending { background: var(--spb); color: var(--sp); }
.b-interv  { background: var(--svb); color: var(--sv); }
.b-active  { background: var(--sab); color: var(--sa); }
.b-offer   { background: var(--sob); color: var(--so); }

/* PRIORITY BUBBLES */
.b-pcritical { background: #FCEBEB; color: #A32D2D; }
.b-phigh     { background: #FEF3DA; color: #8B5E00; }
.b-pmedium   { background: #E8EFFC; color: #1B4FA8; }
.b-plow      { background: #F1EFE8; color: #5F5E5A; }

/* OWNER BUBBLES */
.b-owner { background: #EEE8F8; color: #5B2D9E; }

/* CONTROLS */
.controls { display: flex; align-items: center; gap: 10px; padding: 10px 28px; background: var(--surface); border-bottom: 1px solid var(--border); flex-wrap: wrap; }
.controls label { font-size: 12px; color: var(--text-muted); font-weight: 500; }
select, input[type="text"] { font-family: 'Inter', sans-serif; font-size: 12px; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: 6px; background: var(--bg); color: var(--text); outline: none; min-width: 160px; }
.search-input { min-width: 200px; }

/* TABLE */
.table-wrap { padding: 20px 28px 60px; overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 12.5px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; table-layout: fixed; }
col.c-pr { width: 30px; } col.c-stk { width: 105px; } col.c-proj { width: 75px; } col.c-role { width: 205px; }
col.c-jobid { width: 65px; } col.c-owner { width: 88px; } col.c-pri { width: 78px; }
col.c-status { width: 138px; } col.c-talent { width: 150px; } col.c-notes { width: 215px; }
col.c-rtt { width: 54px; } col.c-rtc { width: 54px; } col.c-loc { width: 85px; }
thead tr th { background: var(--header-bg); color: rgba(255,255,255,0.65); font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; padding: 10px 12px; text-align: left; border-right: 1px solid rgba(255,255,255,0.08); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; user-select: none; }
thead tr th:hover { color: #fff; }
thead tr th:last-child { border-right: none; }
thead tr th.sort-asc::after { content: ' ↑'; opacity: 0.7; }
thead tr th.sort-desc::after { content: ' ↓'; opacity: 0.7; }
tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
tbody tr:last-child { border-bottom: none; }
tbody tr.row-placed { background: var(--active-row); }
tbody tr.row-placed:hover td { background: #E6F5E8; }
tbody tr:not(.row-placed):hover td { background: #F3F1EC; }
td { padding: 9px 12px; vertical-align: middle; border-right: 1px solid var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td:last-child { border-right: none; }
tr.group-start td { border-top: 2px solid var(--border-strong); }
tr.group-start:first-child td { border-top: none; }
td.merged { vertical-align: top; padding-top: 11px; font-weight: 500; }
td.merged.placed-merged { background: var(--active-row); }
td.role-cell { font-weight: 500; white-space: normal; line-height: 1.4; }
td.expand-cell { cursor: pointer; position: relative; }
td.expand-cell span.econtent { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
td.expand-cell .xhint { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; background: var(--text); color: #fff; padding: 2px 6px; border-radius: 4px; white-space: nowrap; z-index: 2; }
td.expand-cell:hover .xhint { display: block; }
td.talent-cell { cursor: pointer; position: relative; }
td.talent-cell span.tname { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #185FA5; font-weight: 500; }
td.talent-cell .xhint, td.notes-cell .xhint { display: none; position: absolute; right: 8px; top: 50%; transform: translateY(-50%); font-size: 10px; background: var(--text); color: #fff; padding: 2px 6px; border-radius: 4px; white-space: nowrap; z-index: 2; }
td.talent-cell:hover .xhint, td.notes-cell:hover .xhint { display: block; }
td.notes-cell { color: var(--text-muted); font-size: 11.5px; cursor: pointer; position: relative; }
td.notes-cell:hover { color: var(--text); }
td.notes-cell span.nprev { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* BADGES */
.status-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; white-space: nowrap; }
.s-finding  { background: var(--sfb); color: var(--sf); }
.s-intro    { background: var(--sib); color: var(--si); }
.s-pending  { background: var(--spb); color: var(--sp); }
.s-interv   { background: var(--svb); color: var(--sv); }
.s-offer    { background: var(--sob); color: var(--so); }
.s-active   { background: var(--sab); color: var(--sa); }
.s-declined { background: var(--sdb); color: var(--sd); }
.s-default  { background: #F1EFE8; color: #5F5E5A; }
.pri-badge { display: inline-flex; align-items: center; padding: 2px 7px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px; }
.pri-critical { background: #FCEBEB; color: #A32D2D; }
.pri-high     { background: #FEF3DA; color: #8B5E00; }
.pri-medium   { background: #E8EFFC; color: #1B4FA8; }
.pri-low      { background: #F1EFE8; color: #5F5E5A; }
td.rate-cell { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--text-muted); text-align: right; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 12px; padding: 24px 28px; max-width: 580px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.modal-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 14px; }
.modal-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
.modal-close { background: none; border: none; font-size: 18px; color: var(--text-hint); cursor: pointer; padding: 0; line-height: 1; flex-shrink: 0; }
.modal-close:hover { color: var(--text); }
.modal-body { font-size: 13px; color: var(--text-muted); line-height: 1.7; white-space: pre-wrap; word-break: break-word; max-height: 380px; overflow-y: auto; }
.modal-meta { margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

/* STATE */
.state-box { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 0; gap: 14px; color: var(--text-hint); }
.spinner { width: 22px; height: 22px; border: 2px solid var(--border); border-top-color: var(--text-muted); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.state-msg { font-size: 13px; }
.export-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--bg); border: 1px solid var(--border-strong); border-radius: 6px; font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 500; color: var(--text-muted); cursor: pointer; transition: all 0.15s; margin-left: auto; }
.export-btn:hover { background: var(--text); color: #fff; border-color: var(--text); }
.days-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px; margin-left: 6px; white-space: nowrap; }
.days-fresh { background: #EAF5EF; color: #2D6A4F; }
.days-mid   { background: #FEF3DA; color: #8B5E00; }
.days-old   { background: #FCEBEB; color: #A32D2D; }
.coverage-tag { display: inline-flex; align-items: center; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-left: 8px; }
.cov-low  { background: #FCEBEB; color: #A32D2D; }
.cov-mid  { background: #FEF3DA; color: #8B5E00; }
.cov-good { background: #EAF5EF; color: #2D6A4F; }
.error-box { background: #FCEBEB; border: 1px solid #F09595; border-radius: 8px; padding: 18px 22px; color: #A32D2D; font-size: 13px; line-height: 1.6; margin: 20px 28px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-left">
    <div class="logo">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="5" r="3" fill="white"/>
        <path d="M2 14c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <h1>Hiring Pipeline</h1>
  </div>
  <div class="top-bar-right">
    <span class="last-updated" id="lastUpdated">—</span>
    <button class="refresh-btn" onclick="loadData()">
      <svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 8a7 7 0 1 0 .8-3.2M1 2v3h3"/></svg>
      Refresh
    </button>
  </div>
</div>

<!-- VIEW TABS -->
<div class="view-tabs">
  <div class="view-tab active" id="tab-all" onclick="setView('all')">All Talent</div>
  <div class="view-tab" id="tab-pipeline" onclick="setView('pipeline')">Pipeline (Non-Active)</div>
  <div class="view-tab" id="tab-placed" onclick="setView('placed')">Placed (Active)</div>
</div>

<!-- STATUS BUBBLES -->
<div class="bubble-section" id="statusBubbles"></div>

<!-- PRIORITY BUBBLES -->
<div class="bubble-section" id="priorityBubbles"></div>

<!-- OWNER BUBBLES -->
<div class="bubble-section" id="ownerBubbles"></div>

<!-- CONTROLS -->
<div class="controls">
  <label>Role</label>
  <select id="roleFilter" onchange="render()"><option value="">All roles</option></select>
  <input type="text" class="search-input" id="searchBox" placeholder="Search anything…" oninput="render()">
  <button class="export-btn" onclick="exportCSV()">
    <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9M4 7l4 4 4-4M2 13h12"/></svg>
    Export CSV
  </button>
</div>

<div id="mainContent">
  <div class="state-box"><div class="spinner"></div><div class="state-msg">Loading from Google Sheets…</div></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-meta" id="modalMeta"></div>
  </div>
</div>

<script>
const SHEET_ID = '1AeN_21v9obkt3gowk9q_DJs2QmRGkYevkH6p2ZirH7c';
const API_URL = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json&gid=0';
const COL = { pr:0, stakeholder:1, project:2, role:3, jobId:4, owner:5, priority:6, status:7, talent:8, notes:9, rtt:10, rtc:11, location:12 };

let rawRows = [], richRows = [];
let currentView = 'all';  // all | pipeline | placed
let statusFilter = '';
let priorityFilter = '';
let ownerFilter = '';
let sortCol = -1, sortDir = 1;

function norm(s){ return (s||'').toLowerCase().trim(); }

// PLACED = status is exactly "ACTIVE" (placed/working)
// PIPELINE = everything else (still being recruited)
function isPlaced(row){ return norm(row[COL.status]) === 'active'; }

function statusClass(s){
  const n=norm(s);
  if(n.includes('finding')) return 's-finding';
  if(n.includes('introduc')) return 's-intro';
  if(n.includes('pending')) return 's-pending';
  if(n.includes('interview')||n.includes('screen')||n.includes('onsite')) return 's-interv';
  if(n.includes('offer')) return 's-offer';
  if(n === 'active') return 's-active';
  if(n.includes('reject')||n.includes('declin')||n.includes('withdraw')) return 's-declined';
  return 's-default';
}
function priorityClass(p){
  const n=norm(p);
  if(n.includes('critical')) return 'pri-critical';
  if(n.includes('high')) return 'pri-high';
  if(n.includes('med')) return 'pri-medium';
  if(n.includes('low')) return 'pri-low';
  return '';
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// URL PARAMS — read/write filters to URL so links are shareable
function readUrlParams(){
  const p = new URLSearchParams(window.location.search);
  if(p.get('view')) currentView = p.get('view');
  if(p.get('owner')) ownerFilter = p.get('owner');
  if(p.get('priority')) priorityFilter = p.get('priority');
  if(p.get('status')) statusFilter = p.get('status');
}

function writeUrlParams(){
  const p = new URLSearchParams();
  if(currentView && currentView!=='all') p.set('view', currentView);
  if(ownerFilter) p.set('owner', ownerFilter);
  if(priorityFilter) p.set('priority', priorityFilter);
  if(statusFilter) p.set('status', statusFilter);
  const str = p.toString();
  const newUrl = window.location.pathname + (str ? '?' + str : '');
  window.history.replaceState({}, '', newUrl);
}

// DAYS SINCE — parse most recent date like "4/14" or "3/24" from notes
function daysSinceNote(notes){
  if(!notes) return null;
  const year = new Date().getFullYear();
  const matches = notes.match(/(\d{1,2})\/(\d{1,2})/g);
  if(!matches) return null;
  let latest = null;
  matches.forEach(m => {
    const parts = m.split('/');
    const month = parseInt(parts[0]) - 1;
    const day = parseInt(parts[1]);
    const d = new Date(year, month, day);
    if(!latest || d > latest) latest = d;
  });
  if(!latest) return null;
  const diff = Math.floor((new Date() - latest) / (1000*60*60*24));
  return diff;
}

function daysBadge(days){
  if(days === null) return '';
  if(days <= 7)  return '<span class="days-badge days-fresh">'+days+'d ago</span>';
  if(days <= 21) return '<span class="days-badge days-mid">'+days+'d ago</span>';
  return '<span class="days-badge days-old">'+days+'d ago</span>';
}

// COVERAGE TAG
function coverageTag(count){
  if(count <= 1) return '<span class="coverage-tag cov-low">'+count+' candidate'+(count!==1?'s':'')+'</span>';
  if(count <= 2) return '<span class="coverage-tag cov-mid">'+count+' candidates</span>';
  return '<span class="coverage-tag cov-good">'+count+' candidates</span>';
}

// EXPORT CSV
function exportCSV(){
  const roleF=document.getElementById('roleFilter').value;
  const search=norm(document.getElementById('searchBox').value);
  let rows=getViewRows().filter(r=>{ if(!matchStatus(r)) return false; if(!matchPriority(r)) return false; if(ownerFilter&&r[COL.owner]!==ownerFilter) return false; if(roleF&&r[COL.role]!==roleF) return false; if(search&&!r.join(' ').toLowerCase().includes(search)) return false; return true; });
  const headers=['PR','Requestor/POC','Project','Role/Job','Job ID','Owner','Priority','Status','Talent','Comments','RTT','RTC','Location'];
  const csvRows=[headers.join(','),...rows.map(r=>r.map(cell=>'"'+String(cell).replace(/"/g,'""')+'"').join(','))];
  const blob=new Blob([csvRows.join('
')],{type:'text/csv'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='hiring-pipeline-'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
}

async function loadData(){
  document.getElementById('mainContent').innerHTML = '<div class="state-box"><div class="spinner"></div><div class="state-msg">Fetching live data…</div></div>';
  try {
    const res = await fetch(API_URL);
    const text = await res.text();
    const json = JSON.parse(text.replace(/^[^\(]*\(/,'').replace(/\);?\s*$/,''));
    const cols = json.table.cols;
    const rows = json.table.rows;
    rawRows = rows.filter(r=>r&&r.c).map(r=>cols.map((_,i)=>{
      const c=r.c[i]; if(!c) return '';
      if(c.f!=null) return String(c.f);
      if(c.v!=null) return String(c.v);
      return '';
    })).filter(r=>r.some(c=>c));
    richRows = rows.filter(r=>r&&r.c).map(r=>cols.map((_,i)=>{
      const c=r.c[i]; if(!c) return {text:'',url:''};
      const text=c.f!=null?String(c.f):(c.v!=null?String(c.v):'');
      let url='';
      if(c.v&&typeof c.v==='string'&&c.v.startsWith('http')) url=c.v;
      if(!url&&c.p){ const ps=JSON.stringify(c.p); const m=ps.match(/https?:\/\/[^"\\]+/); if(m) url=m[0]; }
      return {text,url};
    }));
    if(!rawRows.length) throw new Error('No data found.');
    populateRoleFilter();
    readUrlParams();
    ['all','pipeline','placed'].forEach(t=>document.getElementById('tab-'+t).classList.toggle('active',t===currentView));
    buildBubbles();
    render();
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('mainContent').innerHTML = '<div class="error-box"><strong>Couldn\'t load data.</strong><br>'+e.message+'</div>';
  }
}

function setView(v){
  currentView = v;
  ['all','pipeline','placed'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('active', t===v);
  });
  statusFilter=''; priorityFilter=''; ownerFilter='';
  writeUrlParams(); buildBubbles(); render();
}

function getViewRows(){
  if(currentView==='placed') return rawRows.filter(r=>isPlaced(r));
  if(currentView==='pipeline') return rawRows.filter(r=>!isPlaced(r));
  return rawRows;
}

function buildBubbles(){
  const base = getViewRows();

  // STATUS bubbles
  const sBuckets = [
    { key:'', label:'All', cls:'b-all', match:()=>true },
    { key:'active', label:'Active', cls:'b-active', match:s=>norm(s)==='active' },
    { key:'finding', label:'Finding Talent', cls:'b-finding', match:s=>norm(s).includes('finding') },
    { key:'intro', label:'Introduced', cls:'b-intro', match:s=>norm(s).includes('introduc') },
    { key:'pending', label:'Pending', cls:'b-pending', match:s=>norm(s).includes('pending') },
    { key:'interview', label:'Interviewing', cls:'b-interv', match:s=>norm(s).includes('interview')||norm(s).includes('screen')||norm(s).includes('onsite') },
    { key:'offer', label:'Offer', cls:'b-offer', match:s=>norm(s).includes('offer') },
  ];
  sBuckets.forEach(b=>{ b.count=base.filter(r=>b.match(r[COL.status]||'')).length; });
  let sh = '<span class="bubble-section-label">Status</span>';
  sBuckets.forEach(b=>{
    if(b.count===0&&b.key!=='') return;
    sh += '<div class="bubble '+b.cls+(statusFilter===b.key&&b.key!==''?' on':'')+'" onclick="toggleStatus(\''+b.key+'\')">';
    sh += '<span class="bcount">'+b.count+'</span><span class="blabel">'+b.label+'</span></div>';
  });
  document.getElementById('statusBubbles').innerHTML = sh;

  // PRIORITY bubbles
  const pBuckets = [
    { key:'', label:'All', cls:'b-all', match:()=>true },
    { key:'critical', label:'Critical', cls:'b-pcritical', match:p=>norm(p).includes('critical') },
    { key:'high', label:'High', cls:'b-phigh', match:p=>norm(p).includes('high') },
    { key:'medium', label:'Medium', cls:'b-pmedium', match:p=>norm(p).includes('med') },
    { key:'low', label:'Low', cls:'b-plow', match:p=>norm(p).includes('low') },
  ];
  pBuckets.forEach(b=>{ b.count=base.filter(r=>b.match(r[COL.priority]||'')).length; });
  let ph = '<span class="bubble-section-label">Priority</span>';
  pBuckets.forEach(b=>{
    if(b.count===0&&b.key!=='') return;
    ph += '<div class="bubble '+b.cls+(priorityFilter===b.key&&b.key!==''?' on':'')+'" onclick="togglePriority(\''+b.key+'\')">';
    ph += '<span class="bcount">'+b.count+'</span><span class="blabel">'+b.label+'</span></div>';
  });
  document.getElementById('priorityBubbles').innerHTML = ph;

  // OWNER bubbles
  const owners = [...new Set(base.map(r=>r[COL.owner]).filter(Boolean))].sort();
  let oh = '<span class="bubble-section-label">Owner</span>';
  oh += '<div class="bubble b-all'+(ownerFilter===''?' on':'')+'" onclick="toggleOwner(\'\')"><span class="bcount">'+base.length+'</span><span class="blabel">All</span></div>';
  owners.forEach(o=>{
    const cnt = base.filter(r=>r[COL.owner]===o).length;
    oh += '<div class="bubble b-owner'+(ownerFilter===o?' on':'')+'" onclick="toggleOwner(\''+esc(o)+'\')">';
    oh += '<span class="bcount">'+cnt+'</span><span class="blabel">'+esc(o)+'</span></div>';
  });
  document.getElementById('ownerBubbles').innerHTML = oh;
}

function toggleStatus(k){ statusFilter=(statusFilter===k&&k!=='')?'':k; writeUrlParams(); buildBubbles(); render(); }
function togglePriority(k){ priorityFilter=(priorityFilter===k&&k!=='')?'':k; writeUrlParams(); buildBubbles(); render(); }
function toggleOwner(k){ ownerFilter=(ownerFilter===k&&k!=='')?'':k; writeUrlParams(); buildBubbles(); render(); }

function populateRoleFilter(){
  const roles=[...new Set(rawRows.map(r=>r[COL.role]).filter(Boolean))].sort();
  document.getElementById('roleFilter').innerHTML='<option value="">All roles</option>'+roles.map(r=>'<option value="'+esc(r)+'">'+esc(r)+'</option>').join('');
}

function matchStatus(row){
  if(!statusFilter) return true;
  const s=row[COL.status]||'';
  const m={
    active: s=>norm(s)==='active',
    finding: s=>norm(s).includes('finding'),
    intro: s=>norm(s).includes('introduc'),
    pending: s=>norm(s).includes('pending'),
    interview: s=>norm(s).includes('interview')||norm(s).includes('screen')||norm(s).includes('onsite'),
    offer: s=>norm(s).includes('offer'),
  };
  return m[statusFilter]?m[statusFilter](s):true;
}

function matchPriority(row){
  if(!priorityFilter) return true;
  const p=norm(row[COL.priority]||'');
  if(priorityFilter==='critical') return p.includes('critical');
  if(priorityFilter==='high') return p.includes('high');
  if(priorityFilter==='medium') return p.includes('med');
  if(priorityFilter==='low') return p.includes('low');
  return true;
}

function render(){
  const roleF = document.getElementById('roleFilter').value;
  const search = norm(document.getElementById('searchBox').value);

  let base = getViewRows();
  let filtered = base.filter(r=>{
    if(!matchStatus(r)) return false;
    if(!matchPriority(r)) return false;
    if(ownerFilter && r[COL.owner]!==ownerFilter) return false;
    if(roleF && r[COL.role]!==roleF) return false;
    if(search && !r.join(' ').toLowerCase().includes(search)) return false;
    return true;
  });

  if(!filtered.length){
    document.getElementById('mainContent').innerHTML='<div class="state-box"><div class="state-msg">No results match.</div></div>';
    return;
  }

  // Group by job
  const groups=[];
  let curKey=null, curGroup=null;
  filtered.forEach(r=>{
    const key=(r[COL.role]||'')+'||'+(r[COL.jobId]||'')+'||'+(r[COL.stakeholder]||'');
    if(key!==curKey){ curGroup={key,lr:r,lrich:richRows[rawRows.indexOf(r)],cands:[]}; groups.push(curGroup); curKey=key; }
    curGroup.cands.push({r,rich:richRows[rawRows.indexOf(r)]});
  });

  let html='<div class="table-wrap"><table>';
  html+='<colgroup><col class="c-pr"><col class="c-stk"><col class="c-proj"><col class="c-role"><col class="c-jobid"><col class="c-owner"><col class="c-pri"><col class="c-status"><col class="c-talent"><col class="c-notes"><col class="c-rtt"><col class="c-rtc"><col class="c-loc"></colgroup>';
  html+='<thead><tr><th>PR</th><th>Requestor/POC</th><th>Project</th><th>Role / Job</th><th>Job ID</th><th>Owner</th><th>Priority</th><th>Status</th><th>Talent</th><th>Comments</th><th>RTT</th><th>RTC</th><th>Location</th></tr></thead><tbody>';

  groups.forEach(g=>{
    const span=g.cands.length; const lr=g.lr; const lrich=g.lrich;
    const groupPlaced=isPlaced(lr);
    g.cands.forEach((c,ci)=>{
      const r=c.r; const rich=c.rich; const isFirst=ci===0;
      const rowPlaced=isPlaced(r);
      const talentRich=rich?rich[COL.talent]:null;
      const talentName=(talentRich&&talentRich.text)?talentRich.text:(r[COL.talent]||'—');
      const talentUrl=(talentRich&&talentRich.url)?talentRich.url:'';
      const roleRich=lrich?lrich[COL.role]:null;
      const roleText=(roleRich&&roleRich.text)?roleRich.text:(lr[COL.role]||'');
      const roleUrl=(roleRich&&roleRich.url)?roleRich.url:'';
      const status=r[COL.status]||'';
      const notes=r[COL.notes]||'';
      const priority=lr[COL.priority]||'';
      const pClass=priorityClass(priority);
      const idx=rawRows.indexOf(r);

      html+='<tr'+(isFirst?' class="group-start'+(rowPlaced?' row-placed':'')+'\"':(rowPlaced?' class="row-placed"':''))+'>';
      if(isFirst){
        const rs=span>1?' rowspan="'+span+'"':'';
        const mc='class="merged'+(groupPlaced?' placed-merged':'')+'"';
        html+='<td '+rs+' '+mc+' style="font-size:11px;color:var(--text-hint);">'+esc(lr[COL.pr]||'')+'</td>';
        html+='<td '+rs+' '+mc+' class="merged expand-cell" data-idx="'+rawRows.indexOf(lr)+'" data-field="stakeholder" onclick="openFieldModal(this)" style="font-size:12px;"><span class="econtent">'+esc(lr[COL.stakeholder]||'')+'</span><span class="xhint">expand</span></td>';
        html+='<td '+rs+' '+mc+' style="font-size:12px;color:var(--text-muted);">'+esc(lr[COL.project]||'')+'</td>';
        html+='<td '+rs+' '+mc+' class="merged role-cell expand-cell" data-idx="'+rawRows.indexOf(lr)+'" data-field="role" onclick="openFieldModal(this)"><span class="econtent">'+(roleUrl?'<a href="'+esc(roleUrl)+'" target="_blank" style="color:var(--text);text-decoration:none;border-bottom:1px solid var(--border-strong)">'+esc(roleText)+'</a>':esc(roleText))+coverageTag(span)+'</span><span class="xhint">expand</span></td>';
        html+='<td '+rs+' '+mc+' style="font-size:11px;font-family:\'JetBrains Mono\',monospace;color:var(--text-muted);">'+esc(lr[COL.jobId]||'')+'</td>';
        html+='<td '+rs+' '+mc+' style="font-size:12px;">'+esc(lr[COL.owner]||'')+'</td>';
        html+='<td '+rs+' '+mc+'>'+(pClass?'<span class="pri-badge '+pClass+'">'+esc(priority)+'</span>':esc(priority))+'</td>';
      }
      html+='<td><span class="status-badge '+statusClass(status)+'">'+esc(status)+'</span></td>';
      // Talent cell — clickable to expand full name
      html+='<td class="talent-cell" data-idx="'+idx+'" onclick="openTalentModal(this)">';
      html+='<span class="tname">'+esc(talentName)+'</span>';
      html+='<span class="xhint">expand</span></td>';
      // Notes cell
      if(notes){
        html+='<td class="notes-cell" data-idx="'+idx+'" onclick="openNotesModal(this)"><span class="nprev">'+esc(notes)+daysBadge(daysSinceNote(notes))+'</span><span class="xhint">expand</span></td>';
      } else {
        html+='<td class="notes-cell"><span class="nprev" style="color:var(--text-hint)">—</span></td>';
      }
      html+='<td class="rate-cell">'+esc(r[COL.rtt]||'')+'</td>';
      html+='<td class="rate-cell">'+esc(r[COL.rtc]||'')+'</td>';
      html+='<td style="font-size:12px;color:var(--text-muted);">'+esc(r[COL.location]||'')+'</td>';
      html+='</tr>';
    });
  });

  html+='</tbody></table></div>';
  document.getElementById('mainContent').innerHTML=html;
}

function openFieldModal(td){
  const idx=parseInt(td.getAttribute('data-idx'));
  const field=td.getAttribute('data-field');
  const r=rawRows[idx]; const rich=richRows[idx];
  if(field==='stakeholder'){
    document.getElementById('modalTitle').textContent='Requestor / POC';
    document.getElementById('modalBody').textContent=r[COL.stakeholder]||'—';
    document.getElementById('modalMeta').innerHTML=(r[COL.role]?'<span style="font-size:12px;color:var(--text-muted);">'+esc(r[COL.role])+'</span>':'');
  } else if(field==='role'){
    const rr=rich?rich[COL.role]:null;
    const roleText=(rr&&rr.text)?rr.text:(r[COL.role]||'—');
    const roleUrl=(rr&&rr.url)?rr.url:'';
    document.getElementById('modalTitle').textContent='Role / Job';
    document.getElementById('modalBody').innerHTML='<strong style="font-size:14px;color:var(--text);">'+esc(roleText)+'</strong>'+(roleUrl?'<br><br><a href="'+esc(roleUrl)+'" target="_blank" style="color:#1B4FA8;font-weight:500;">View job description ↗</a>':'');
    document.getElementById('modalMeta').innerHTML=(r[COL.jobId]?'<span style="font-size:12px;font-family:'JetBrains Mono',monospace;color:var(--text-muted);">Job ID: '+esc(r[COL.jobId])+'</span>':'')+(r[COL.owner]?'<span style="font-size:12px;color:var(--text-muted);">Owner: '+esc(r[COL.owner])+'</span>':'')+(r[COL.priority]?'<span class="pri-badge '+priorityClass(r[COL.priority])+'">'+esc(r[COL.priority])+'</span>':'');
  }
  document.getElementById('modalOverlay').classList.add('open');
}

function openTalentModal(td){
  const idx=parseInt(td.getAttribute('data-idx'));
  const r=rawRows[idx]; const rich=richRows[idx];
  const talentRich=rich?rich[COL.talent]:null;
  const name=(talentRich&&talentRich.text)?talentRich.text:(r[COL.talent]||'—');
  const url=(talentRich&&talentRich.url)?talentRich.url:'';
  document.getElementById('modalTitle').textContent=name;
  document.getElementById('modalBody').innerHTML=url
    ? '<a href="'+esc(url)+'" target="_blank" style="color:#1B4FA8;font-weight:500;">View talent profile ↗</a>'
    : '<span style="color:var(--text-hint)">No profile link available.</span>';
  const sc=statusClass(r[COL.status]||'');
  document.getElementById('modalMeta').innerHTML=
    (r[COL.status]?'<span class="status-badge '+sc+'">'+esc(r[COL.status])+'</span>':'')+
    (r[COL.role]?'<span style="font-size:12px;color:var(--text-muted);">'+esc(r[COL.role])+'</span>':'')+
    (r[COL.owner]?'<span style="font-size:12px;color:var(--text-muted);">'+esc(r[COL.owner])+'</span>':'');
  document.getElementById('modalOverlay').classList.add('open');
}

function openNotesModal(td){
  const idx=parseInt(td.getAttribute('data-idx'));
  const r=rawRows[idx]; const rich=richRows[idx];
  const talentRich=rich?rich[COL.talent]:null;
  const name=(talentRich&&talentRich.text)?talentRich.text:(r[COL.talent]||'—');
  document.getElementById('modalTitle').textContent=name;
  document.getElementById('modalBody').textContent=r[COL.notes]||'';
  const sc=statusClass(r[COL.status]||'');
  document.getElementById('modalMeta').innerHTML=
    (r[COL.status]?'<span class="status-badge '+sc+'">'+esc(r[COL.status])+'</span>':'')+
    (r[COL.role]?'<span style="font-size:12px;color:var(--text-muted);">'+esc(r[COL.role])+'</span>':'');
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(e){ if(e.target===document.getElementById('modalOverlay')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('modalOverlay').classList.remove('open'); }
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModalDirect(); });

loadData();
</script>
